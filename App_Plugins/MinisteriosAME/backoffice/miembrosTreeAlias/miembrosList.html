<!-- App_Plugins/MinisteriosAME/Views/miembrosList.html -->
<div ng-controller="MiembrosListController as vm">
    <umb-search-filter
        model="vm.searchQuery"
        on-change="vm.filterMembers()"
        placeholder="Search members...">
    </umb-search-filter>
    <umb-table
        ng-if="vm.filteredMembers"
        items="vm.filteredMembers"
        item-properties="vm.options.includeProperties"
        allow-select-all="true"
        on-select="vm.selectItem"
        on-click="vm.clickItem"
        on-select-all="vm.selectAll"
        on-selected-all="vm.isSelectedAll"
        on-sorting-direction="vm.isSortDirection"
        on-sort="vm.sort">
    </umb-table>
</div>
